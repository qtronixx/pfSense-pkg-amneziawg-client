name: Build pfSense FreeBSD Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Compile and pack inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: '15.1-RELEASE'
          usesh: true
          prepare: |
            pkg update
          run: |
            set -e

            # Собираем staging-дерево напрямую из структуры репозитория -
            # она зеркалит конечные пути установки (etc/... -> /etc/...,
            # usr/... -> /usr/...), поэтому просто копируем оба каталога
            # целиком, без перечисления файлов поимённо.
            mkdir -p staging
            cp -R etc staging/etc
            cp -R usr staging/usr

            # rc.d-скрипт обязан быть исполняемым - см. историю правок
            # (изначально указывалось chmod 555 отдельным шагом инструкции,
            # здесь фиксируем это прямо в сборке, чтобы не забыть).
            chmod 555 staging/usr/local/etc/rc.d/awg.sh

            # Манифест передаётся напрямую в -M, без переименования в
            # +MANIFEST - это корректный современный синтаксис pkg-create(8),
            # имя файла не обязано быть именно "+MANIFEST".
            pkg create -M manifest.ucl -r staging -o .

      - name: Archive build artifacts for download
        uses: actions/upload-artifact@v4
        with:
          name: pfSense-AmneziaWG-Package
          path: ./*.pkg