name: Build pfSense FreeBSD Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Compile and pack inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: '15.1'
          usesh: true
          prepare: |
            pkg update
          run: |
            set -e

            mkdir -p staging metadatadir
            cp -R etc staging/etc
            cp -R usr staging/usr
            chmod 555 staging/usr/local/etc/rc.d/awg.sh

            # metadatadir должен содержать +MANIFEST (не manifest.ucl -
            # для -m именно такое имя ожидается по конвенции)
            cp manifest.ucl metadatadir/+MANIFEST

            echo "=== Содержимое staging/ ==="
            find staging -type f

            # pkg-plist - пути ОТНОСИТЕЛЬНО staging (то есть без ведущего /)
            cd staging
            find . -type f | sed 's|^\./||' > ../pkg-plist-generated
            cd ..
            cat pkg-plist-generated

            pkg create -m metadatadir -p pkg-plist-generated -r staging -o .

            echo "=== Результат ==="
            ls -la *.pkg

      - name: Archive build artifacts for download
        uses: actions/upload-artifact@v4
        with:
          name: pfSense-AmneziaWG-Package
          path: ./*.pkg